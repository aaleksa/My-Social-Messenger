<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Social Network</title>
<link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<!-- Toast -->
<div id="toast" class="hidden"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <h1>&#127760; Social Network</h1>
    <p class="sub">Desktop App</p>
    <div class="fg"><label>Email</label><input type="email" id="lei" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="fg"><label>Password</label>
      <div style="position:relative">
        <input type="password" id="lpw" placeholder="password" autocomplete="current-password" style="padding-right:40px"/>
        <button type="button" id="tog-pw" class="toggle-pw">&#128065;</button>
      </div>
    </div>
    <button class="btn btn-primary" id="login-btn" style="width:100%;margin-top:4px">Sign In</button>
    <button class="btn btn-secondary" id="reg-btn" style="width:100%;margin-top:9px">No account? Register</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header id="topbar">
    <div class="brand">Social <span>Network</span></div>
    <input class="tb-search" id="tb-search" placeholder="Search" autocomplete="off"/>
    <button id="notif-btn" title="Notifications">&#128276;<span id="notif-badge"></span></button>
    <div id="conn-dot" title="WS"></div>
    <div class="tb-user" id="tb-user-btn"><div class="tb-av" id="tb-av">?</div><span id="tb-name">...</span></div>
    <button id="logout-btn">Logout</button>
  </header>

  <nav id="nav">
    <div class="ni active" data-page="feed"><span class="ni-icon">&#127968;</span> Feed</div>
    <div class="ni" data-page="profile"><span class="ni-icon">&#128100;</span> Profile</div>
    <div class="ni" data-page="people"><span class="ni-icon">&#128101;</span> People</div>
    <div class="ni" data-page="groups"><span class="ni-icon">&#127963;</span> Groups</div>
    <div class="ni" data-page="chat"><span class="ni-icon">&#128172;</span> Chat</div>
    <div class="ni" data-page="notifications"><span class="ni-icon">&#128276;</span> Notifications</div>
  </nav>

  <div id="main">

    <!-- FEED -->
    <div class="page active" id="page-feed">
      <div class="post-create" id="post-create-box">
        <div class="post-create-top">
          <div class="pav" id="feed-av">?</div>
          <textarea id="post-inp" placeholder="What's on your mind?" rows="3"></textarea>
        </div>
        <div id="post-img-prev" class="hidden" style="margin-top:10px;position:relative">
          <img id="prev-img" src="" alt="" style="max-height:200px"/>
          <button id="rm-img-btn" style="position:absolute;top:5px;right:5px;background:#0009;border:none;border-radius:50%;width:24px;height:24px;color:#fff;cursor:pointer;font-size:13px">X</button>
        </div>
        <div class="post-bar">
          <button class="pbar-btn" id="attach-btn">&#128247; Photo</button>
          <input type="file" id="post-file" accept="image/*" style="display:none"/>
          <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
            <select id="post-vis" style="padding:5px 10px;background:var(--bg-mid);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;outline:none">
              <option value="public">&#127757; Public</option>
              <option value="followers">&#128101; Followers</option>
              <option value="private">&#128274; Private</option>
            </select>
            <button class="btn btn-primary btn-sm" id="post-submit">Post</button>
          </div>
        </div>
      </div>
      <div id="feed-list"></div>
    </div>

    <!-- PROFILE -->
    <div class="page" id="page-profile">
      <div class="profile-cover"></div>
      <div class="profile-card">
        <div class="p-info">
          <div class="p-big-av" id="p-big-av">?</div>
          <div style="flex:1;padding-bottom:4px">
            <div class="p-name" id="p-name">...</div>
            <div class="p-nick" id="p-nick"></div>
            <div class="p-bio" id="p-bio"></div>
          </div>
          <div style="display:flex;gap:8px;padding-bottom:4px">
            <button class="btn btn-secondary btn-sm" id="edit-p-btn">Edit</button>
            <button class="btn btn-secondary btn-sm" id="priv-btn">&#128274; Privacy</button>
          </div>
        </div>
        <div class="p-stats">
          <div class="p-stat"><div class="p-stat-num" id="st-posts">0</div><div class="p-stat-lbl">Posts</div></div>
          <div class="p-stat"><div class="p-stat-num" id="st-followers">0</div><div class="p-stat-lbl">Followers</div></div>
          <div class="p-stat"><div class="p-stat-num" id="st-following">0</div><div class="p-stat-lbl">Following</div></div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab active" data-tp="tp-posts">Posts</button>
        <button class="tab" data-tp="tp-followers">Followers</button>
        <button class="tab" data-tp="tp-following">Following</button>
      </div>
      <div class="tab-panel active" id="tp-posts"></div>
      <div class="tab-panel" id="tp-followers"></div>
      <div class="tab-panel" id="tp-following"></div>
    </div>

    <!-- PEOPLE -->
    <div class="page" id="page-people">
      <div class="page-title"><span>&#128101;</span> People</div>
      <input id="ppl-srch" style="width:100%;max-width:320px;padding:9px 13px;background:var(--bg-mid);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;margin-bottom:17px;display:block;transition:border-color var(--tr)" placeholder="Search by name..." autocomplete="off"/>
      <div class="people-grid" id="people-grid"></div>
    </div>

    <!-- GROUPS -->
    <div class="page" id="page-groups">
      <div id="g-list-view">
        <div class="sec-hdr">
          <div class="page-title" style="margin-bottom:0"><span>&#127963;</span> Groups</div>
          <button class="btn btn-primary btn-sm" id="new-grp-btn">+ Create</button>
        </div>
        <div class="tabs" style="margin-top:14px">
          <button class="tab active" data-gt="gt-all">All Groups</button>
          <button class="tab" data-gt="gt-mine">My Groups</button>
        </div>
        <div class="tab-panel active" id="gt-all"><div class="groups-grid" id="gg-all"></div></div>
        <div class="tab-panel" id="gt-mine"><div class="groups-grid" id="gg-mine"></div></div>
      </div>
      <div id="g-detail-view" class="hidden">
        <button class="btn btn-secondary btn-sm" id="back-grp-btn" style="margin-bottom:15px">Back</button>
        <div id="g-detail-content"></div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="page" id="page-chat"></div>

    <!-- NOTIFICATIONS -->
    <div class="page" id="page-notifications">
      <div class="sec-hdr">
        <div class="page-title" style="margin-bottom:0"><span>&#128276;</span> Notifications</div>
        <button class="btn btn-secondary btn-sm" id="mark-all-btn">Mark all read</button>
      </div>
      <div id="notif-list"></div>
    </div>

  </div>
</div>

<!-- Edit Profile Modal -->
<div id="m-edit-p" class="modal-backdrop hidden">
  <div class="modal">
    <button class="modal-close" data-close="m-edit-p">X</button>
    <h2>Edit Profile</h2>
    <div class="fg"><label>First Name</label><input id="ep-fn" type="text"/></div>
    <div class="fg"><label>Last Name</label><input id="ep-ln" type="text"/></div>
    <div class="fg"><label>Nickname</label><input id="ep-nick" type="text" placeholder="optional"/></div>
    <div class="fg"><label>About Me</label><textarea id="ep-about"></textarea></div>
    <div class="fg"><label>Avatar</label><input id="ep-av-file" type="file" accept="image/*" style="padding:4px"/></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
      <button class="btn btn-secondary" data-close="m-edit-p">Cancel</button>
      <button class="btn btn-primary" id="save-p-btn">Save</button>
    </div>
  </div>
</div>

<!-- Create Group Modal -->
<div id="m-cg" class="modal-backdrop hidden">
  <div class="modal">
    <button class="modal-close" data-close="m-cg">X</button>
    <h2>Create Group</h2>
    <div class="fg"><label>Name</label><input id="cg-name" type="text" placeholder="My Group"/></div>
    <div class="fg"><label>Description</label><textarea id="cg-desc"></textarea></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
      <button class="btn btn-secondary" data-close="m-cg">Cancel</button>
      <button class="btn btn-primary" id="cg-submit">Create</button>
    </div>
  </div>
</div>

<!-- Create Event Modal -->
<div id="m-ce" class="modal-backdrop hidden">
  <div class="modal">
    <button class="modal-close" data-close="m-ce">X</button>
    <h2>Create Event</h2>
    <input type="hidden" id="ce-gid"/>
    <div class="fg"><label>Title</label><input id="ce-title" type="text"/></div>
    <div class="fg"><label>Description</label><textarea id="ce-desc"></textarea></div>
    <div class="fg"><label>Date &amp; Time</label><input id="ce-date" type="datetime-local"/></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px">
      <button class="btn btn-secondary" data-close="m-ce">Cancel</button>
      <button class="btn btn-primary" id="ce-submit">Create</button>
    </div>
  </div>
</div>

<!-- User Profile Modal -->
<div id="m-user" class="modal-backdrop hidden">
  <div class="modal" style="width:480px">
    <button class="modal-close" data-close="m-user">X</button>
    <div id="m-user-body"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/websocket.js"></script>
<script src="js/feed.js"></script>
<script src="js/profile.js"></script>
<script src="js/people.js"></script>
<script src="js/groups.js"></script>
<script src="js/chat.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
</body>
</html>
